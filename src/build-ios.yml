name: Build iOS (Unsigned IPA)

on:
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công trên GitHub

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest # Sử dụng máy chủ MacOS mới nhất của GitHub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Sử dụng Node 20

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Build iOS App (Unsigned)
        run: |
          cd ios/App
          # Ra lệnh cho Xcode build app mà không cần chứng chỉ Apple Developer
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO clean build CONFIGURATION_BUILD_DIR="$(pwd)/build/Release-iphoneos"

      - name: Create IPA payload
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Release-iphoneos/App.app Payload/
          zip -r DigiWell-iOS.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DigiWell-iOS-App
          path: DigiWell-iOS.ipa