name: Build iOS (Unsigned IPA)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env file for build
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}" >> .env

      - name: Build Web App
        run: npm run build

      - name: Add or Sync Capacitor iOS
        run: |
          if [ ! -d "ios" ]; then
            echo "Folder ios không tồn tại. Đang tạo mới..."
            npx cap add ios
          else
            echo "Đang đồng bộ source code vào dự án ios..."
            npx cap sync ios
          fi

      - name: Build iOS App (Unsigned)
        run: |
          cd ios/App
          if [ -d "App.xcworkspace" ]; then
            echo "Tìm thấy App.xcworkspace. Đang build..."
            xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO clean build CONFIGURATION_BUILD_DIR="$(pwd)/build/Release-iphoneos"
          else
            echo "Không có xcworkspace, tìm thấy App.xcodeproj. Đang build..."
            xcodebuild -project App.xcodeproj -scheme App -configuration Release -sdk iphoneos CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO clean build CONFIGURATION_BUILD_DIR="$(pwd)/build/Release-iphoneos"
          fi

      - name: Create IPA payload
        run: |
          mkdir -p Payload
          cp -r ios/App/build/Release-iphoneos/App.app Payload/
          zip -r DigiWell-iOS.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DigiWell-iOS-App
          path: DigiWell-iOS.ipa
