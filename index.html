<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#06B6D4" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="DigiWell - Ứng dụng theo dõi sức khỏe và uống nước thông minh" />
    <title>DigiWell</title>

    <script>
      // 1. Bắt các lỗi Javascript thông thường (như sai cú pháp, gọi biến không tồn tại)
      window.onerror = function(message, source, lineno, colno, error) {
        alert("🚨 LỖI APP SẾP ƠI:\n" + message + "\n\nDòng: " + lineno);
        return false;
      };

      // 2. Bắt các lỗi chạy ngầm (API lỗi, Supabase từ chối kết nối, v.v...)
      window.addEventListener("unhandledrejection", function(event) {
        alert("⚠️ LỖI CHẠY NGẦM:\n" + (event.reason ? event.reason.message || event.reason : "Không rõ nguyên nhân"));
      });
    </script>
    </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
